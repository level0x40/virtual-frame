<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #f8f9fa;
        padding: 20px;
        margin: 0;
      }

      .container {
        max-width: 500px;
        margin: 0 auto;
      }

      h1 {
        color: #333;
        text-align: center;
        font-size: 1.4em;
      }

      h2 {
        color: #555;
        font-size: 1em;
        margin-top: 28px;
        border-bottom: 1px solid #ddd;
        padding-bottom: 6px;
      }

      .svg-section {
        margin: 16px 0;
        text-align: center;
      }

      svg {
        display: block;
        margin: 0 auto;
        max-width: 100%;
      }

      button {
        background: #007acc;
        color: white;
        border: none;
        padding: 8px 14px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        margin: 4px;
      }

      button:hover {
        background: #005a9e;
      }

      .controls {
        text-align: center;
        margin-top: 10px;
      }

      .info {
        font-size: 0.85em;
        color: #888;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>SVG Elements</h1>

      <h2>Interactive Shapes</h2>
      <div class="svg-section">
        <svg
          id="shapes"
          width="460"
          height="200"
          viewBox="0 0 460 200"
          style="background: white; border-radius: 8px; border: 1px solid #ddd"
        >
          <circle
            id="circle1"
            cx="80"
            cy="100"
            r="40"
            fill="#007acc"
            style="cursor: pointer"
          />
          <rect
            id="rect1"
            x="160"
            y="60"
            width="80"
            height="80"
            rx="8"
            fill="#e74c3c"
            style="cursor: pointer"
          />
          <polygon
            id="tri1"
            points="310,60 350,140 270,140"
            fill="#2ecc71"
            style="cursor: pointer"
          />
          <ellipse
            id="ellipse1"
            cx="410"
            cy="100"
            rx="40"
            ry="30"
            fill="#f39c12"
            style="cursor: pointer"
          />
        </svg>
        <div class="controls">
          <button onclick="randomizeColors()">Random Colors</button>
          <button onclick="resetShapes()">Reset</button>
        </div>
        <p class="info">Click shapes to change their color</p>
      </div>

      <h2>Animated Clock</h2>
      <div class="svg-section">
        <svg
          id="clock"
          width="200"
          height="200"
          viewBox="0 0 200 200"
          style="background: white; border-radius: 50%; border: 2px solid #ddd"
        >
          <circle
            cx="100"
            cy="100"
            r="95"
            fill="none"
            stroke="#333"
            stroke-width="2"
          />
          <!-- Hour markers -->
          <line
            x1="100"
            y1="10"
            x2="100"
            y2="25"
            stroke="#333"
            stroke-width="3"
            id="m12"
          />
          <line
            x1="145"
            y1="18"
            x2="138"
            y2="31"
            stroke="#333"
            stroke-width="2"
          />
          <line
            x1="182"
            y1="55"
            x2="169"
            y2="62"
            stroke="#333"
            stroke-width="2"
          />
          <line
            x1="190"
            y1="100"
            x2="175"
            y2="100"
            stroke="#333"
            stroke-width="3"
          />
          <line
            x1="182"
            y1="145"
            x2="169"
            y2="138"
            stroke="#333"
            stroke-width="2"
          />
          <line
            x1="145"
            y1="182"
            x2="138"
            y2="169"
            stroke="#333"
            stroke-width="2"
          />
          <line
            x1="100"
            y1="190"
            x2="100"
            y2="175"
            stroke="#333"
            stroke-width="3"
          />
          <line
            x1="55"
            y1="182"
            x2="62"
            y2="169"
            stroke="#333"
            stroke-width="2"
          />
          <line
            x1="18"
            y1="145"
            x2="31"
            y2="138"
            stroke="#333"
            stroke-width="2"
          />
          <line
            x1="10"
            y1="100"
            x2="25"
            y2="100"
            stroke="#333"
            stroke-width="3"
          />
          <line
            x1="18"
            y1="55"
            x2="31"
            y2="62"
            stroke="#333"
            stroke-width="2"
          />
          <line
            x1="55"
            y1="18"
            x2="62"
            y2="31"
            stroke="#333"
            stroke-width="2"
          />
          <!-- Hands -->
          <line
            id="hourHand"
            x1="100"
            y1="100"
            x2="100"
            y2="45"
            stroke="#333"
            stroke-width="4"
            stroke-linecap="round"
          />
          <line
            id="minuteHand"
            x1="100"
            y1="100"
            x2="100"
            y2="30"
            stroke="#555"
            stroke-width="3"
            stroke-linecap="round"
          />
          <line
            id="secondHand"
            x1="100"
            y1="100"
            x2="100"
            y2="22"
            stroke="#e74c3c"
            stroke-width="1.5"
            stroke-linecap="round"
          />
          <circle cx="100" cy="100" r="4" fill="#333" />
        </svg>
      </div>

      <h2>Path Morphing</h2>
      <div class="svg-section">
        <svg
          id="morphSvg"
          width="460"
          height="150"
          viewBox="0 0 460 150"
          style="background: white; border-radius: 8px; border: 1px solid #ddd"
        >
          <path
            id="morphPath"
            d=""
            fill="none"
            stroke="#007acc"
            stroke-width="3"
          />
        </svg>
        <div class="controls">
          <button onclick="setWave('sine')">Sine Wave</button>
          <button onclick="setWave('square')">Square Wave</button>
          <button onclick="setWave('sawtooth')">Sawtooth</button>
          <button onclick="setWave('noise')">Noise</button>
        </div>
      </div>

      <h2>Spinner / Loading</h2>
      <div class="svg-section">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle
            cx="50"
            cy="50"
            r="40"
            fill="none"
            stroke="#eee"
            stroke-width="8"
          />
          <circle
            cx="50"
            cy="50"
            r="40"
            fill="none"
            stroke="#007acc"
            stroke-width="8"
            stroke-dasharray="80 170"
            stroke-linecap="round"
          >
            <animateTransform
              attributeName="transform"
              type="rotate"
              from="0 50 50"
              to="360 50 50"
              dur="1s"
              repeatCount="indefinite"
            />
          </circle>
        </svg>
        <p class="info">
          SVG animation via <code>&lt;animateTransform&gt;</code>
        </p>
      </div>

      <h2>Data Visualization</h2>
      <div class="svg-section">
        <svg
          id="barChart"
          width="460"
          height="200"
          viewBox="0 0 460 200"
          style="background: white; border-radius: 8px; border: 1px solid #ddd"
        >
          <!-- Axes -->
          <line
            x1="40"
            y1="170"
            x2="440"
            y2="170"
            stroke="#999"
            stroke-width="1"
          />
          <line
            x1="40"
            y1="10"
            x2="40"
            y2="170"
            stroke="#999"
            stroke-width="1"
          />
        </svg>
        <div class="controls">
          <button onclick="randomizeChart()">Randomize Data</button>
        </div>
      </div>
    </div>

    <script>
      // Interactive shapes - click to change color
      const shapeIds = ["circle1", "rect1", "tri1", "ellipse1"];
      const defaultColors = ["#007acc", "#e74c3c", "#2ecc71", "#f39c12"];

      shapeIds.forEach((id) => {
        document.getElementById(id).addEventListener("click", function () {
          this.setAttribute("fill", `hsl(${Math.random() * 360}, 70%, 55%)`);
        });
      });

      function randomizeColors() {
        shapeIds.forEach((id) => {
          document
            .getElementById(id)
            .setAttribute("fill", `hsl(${Math.random() * 360}, 70%, 55%)`);
        });
      }

      function resetShapes() {
        shapeIds.forEach((id, i) => {
          document.getElementById(id).setAttribute("fill", defaultColors[i]);
        });
      }

      // Animated clock
      function updateClock() {
        const now = new Date();
        const h = now.getHours() % 12;
        const m = now.getMinutes();
        const s = now.getSeconds();
        const ms = now.getMilliseconds();

        const secondAngle = ((s + ms / 1000) / 60) * 360;
        const minuteAngle = ((m + s / 60) / 60) * 360;
        const hourAngle = ((h + m / 60) / 12) * 360;

        document
          .getElementById("hourHand")
          .setAttribute("transform", `rotate(${hourAngle}, 100, 100)`);
        document
          .getElementById("minuteHand")
          .setAttribute("transform", `rotate(${minuteAngle}, 100, 100)`);
        document
          .getElementById("secondHand")
          .setAttribute("transform", `rotate(${secondAngle}, 100, 100)`);

        requestAnimationFrame(updateClock);
      }
      updateClock();

      // Wave path morphing
      let currentWave = "sine";
      let wavePhase = 0;

      function generateWavePath(type) {
        const w = 460,
          h = 150,
          mid = h / 2;
        let d = `M 10 ${mid}`;
        for (let x = 10; x <= w - 10; x += 2) {
          const t = ((x - 10) / (w - 20)) * Math.PI * 4 + wavePhase;
          let y;
          switch (type) {
            case "sine":
              y = mid + Math.sin(t) * 50;
              break;
            case "square":
              y = mid + (Math.sin(t) > 0 ? -50 : 50);
              break;
            case "sawtooth":
              y = mid + ((t % (Math.PI * 2)) / Math.PI - 1) * 50;
              break;
            case "noise":
              y = mid + (Math.sin(t * 3) + Math.cos(t * 7) * 0.5) * 35;
              break;
            default:
              y = mid;
          }
          d += ` L ${x} ${y}`;
        }
        return d;
      }

      function setWave(type) {
        currentWave = type;
      }

      function animateWave() {
        wavePhase += 0.05;
        document
          .getElementById("morphPath")
          .setAttribute("d", generateWavePath(currentWave));
        requestAnimationFrame(animateWave);
      }
      animateWave();

      // Bar chart
      const chartColors = [
        "#007acc",
        "#e74c3c",
        "#2ecc71",
        "#f39c12",
        "#9b59b6",
        "#1abc9c",
        "#e67e22",
        "#3498db",
      ];
      const labels = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun", "Avg"];

      function randomizeChart() {
        const svg = document.getElementById("barChart");
        // Remove old bars and labels
        svg
          .querySelectorAll(".bar, .bar-label, .bar-value")
          .forEach((el) => el.remove());

        const barWidth = 40;
        const gap = 10;
        const startX = 55;

        labels.forEach((label, i) => {
          const value = Math.random() * 140 + 10;
          const barHeight = value;
          const x = startX + i * (barWidth + gap);
          const y = 170 - barHeight;

          const rect = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "rect",
          );
          rect.setAttribute("class", "bar");
          rect.setAttribute("x", x);
          rect.setAttribute("y", y);
          rect.setAttribute("width", barWidth);
          rect.setAttribute("height", barHeight);
          rect.setAttribute("rx", "3");
          rect.setAttribute("fill", chartColors[i]);
          svg.appendChild(rect);

          const text = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "text",
          );
          text.setAttribute("class", "bar-label");
          text.setAttribute("x", x + barWidth / 2);
          text.setAttribute("y", 188);
          text.setAttribute("text-anchor", "middle");
          text.setAttribute("font-size", "11");
          text.setAttribute("fill", "#666");
          text.textContent = label;
          svg.appendChild(text);

          const val = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "text",
          );
          val.setAttribute("class", "bar-value");
          val.setAttribute("x", x + barWidth / 2);
          val.setAttribute("y", y - 4);
          val.setAttribute("text-anchor", "middle");
          val.setAttribute("font-size", "10");
          val.setAttribute("fill", "#333");
          val.textContent = Math.round(value);
          svg.appendChild(val);
        });
      }

      randomizeChart();
    </script>
  </body>
</html>
