name: Setup
description: Install Vite+ (vp), set up Node.js with dependency caching, and install dependencies (frozen lockfile).

inputs:
  node-version:
    description: Node.js version
    required: false
    # Node 24 ships with npm 11, which has native OIDC / Trusted
    # Publishers support — required by the `release` job to exchange a
    # GitHub OIDC token for an npm publish credential. Node 22 LTS's
    # bundled npm 10.x does not support this flow.
    default: "24"

runs:
  using: composite
  steps:
    - name: Setup Vite+
      uses: voidzero-dev/setup-vp@v1
      with:
        node-version: ${{ inputs.node-version }}
        cache: true

    - name: Install dependencies
      shell: bash
      run: vp install --frozen-lockfile
