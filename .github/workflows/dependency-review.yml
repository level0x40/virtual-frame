name: Dependency Review

# Diffs the lockfile vs the base branch on every PR and fails when a
# dependency change introduces a high-severity vulnerability or a
# disallowed license. Runs entirely against GitHub's advisory database;
# no third-party services involved.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      # Required to post the inline summary comment on the PR.
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          # Common copyleft licenses are flagged so we can review before
          # accepting them into a Source-Available codebase. Adjust as
          # the legal posture evolves.
          deny-licenses: AGPL-1.0-or-later, AGPL-3.0-or-later, GPL-2.0-or-later, GPL-3.0-or-later
