name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref. main always runs to completion
# because we want every push-to-main commit reflected in the status checks.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

# Disable husky hook installation in CI. Hooks are a developer ergonomics
# tool (pre-commit lint-staged etc.) and assume `pnpm` is on PATH, which
# it isn't in our setup (the setup action installs Vite+'s `vp`, which
# delegates to pnpm internally but doesn't expose the binary). Without
# this, `changesets/action`'s `git commit` in the release job trips the
# pre-commit hook and fails with "pnpm: not found".
env:
  HUSKY: 0

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # PR hygiene — title must follow Conventional Commits so that release
  # notes and downstream tooling stay consistent.
  # ──────────────────────────────────────────────────────────────────────
  pr-title:
    name: PR Title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      pull-requests: read
    steps:
      - name: Validate Conventional Commits format
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^[A-Za-z0-9].+$
          subjectPatternError: |
            The PR title subject must start with an alphanumeric character.

  # ──────────────────────────────────────────────────────────────────────
  # Static analysis — formatting + lint. Cheap, runs first.
  # ──────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - name: Check formatting
        run: vp run format:check

      - name: Lint
        run: vp run lint

  # ──────────────────────────────────────────────────────────────────────
  # Build all packages and examples. Uploads dist/ artifacts for
  # downstream jobs (typecheck, test, e2e) so they don't rebuild.
  # ──────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - name: Build all packages
        run: vp run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: build-output
          path: |
            packages/*/dist
          retention-days: 1

      - name: Upload generated route files
        uses: actions/upload-artifact@v5
        with:
          name: generated-routes
          path: |
            examples/*/src/routeTree.gen.ts
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────
  # Type-check across the workspace.
  #
  # Skipped on the Version Packages merge commit — the PR only bumps
  # package.json versions and regenerates CHANGELOG.md, neither of which
  # can change type-check outcomes that were already green on the source
  # commit. Same rationale for `test` and `e2e` below.
  # ──────────────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    needs: [build]
    if: |
      !(
        (github.event_name == 'push' && startsWith(github.event.head_commit.message, 'chore(release): version packages'))
        || (github.event_name == 'pull_request' && startsWith(github.event.pull_request.title, 'chore(release): version packages'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: build-output
          path: packages

      - name: Download generated route files
        uses: actions/download-artifact@v5
        with:
          name: generated-routes
          path: examples

      - name: Typecheck all packages
        run: vp run typecheck

  # ──────────────────────────────────────────────────────────────────────
  # Unit + browser tests via vitest. Skipped on Version Packages merges
  # (see `typecheck` above).
  # ──────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    needs: [build]
    if: |
      !(
        (github.event_name == 'push' && startsWith(github.event.head_commit.message, 'chore(release): version packages'))
        || (github.event_name == 'pull_request' && startsWith(github.event.pull_request.title, 'chore(release): version packages'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: build-output
          path: packages

      - name: Install Playwright browsers
        # vitest browser mode uses Playwright's chromium under the hood.
        run: npx playwright install --with-deps chromium

      - name: Run vitest
        run: vp run test:run

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────
  # End-to-end Playwright suite — boots real example apps in dev and prod
  # mode against a real browser. This is a required gate.
  # Skipped on Version Packages merges (see `typecheck` above).
  # ──────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E (Playwright)
    needs: [build]
    if: |
      !(
        (github.event_name == 'push' && startsWith(github.event.head_commit.message, 'chore(release): version packages'))
        || (github.event_name == 'pull_request' && startsWith(github.event.pull_request.title, 'chore(release): version packages'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: build-output
          path: packages

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite
        run: vp run test:e2e
        env:
          VF_E2E_VERBOSE: "1"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
          if-no-files-found: ignore
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────
  # Changeset gate — ensure version-bumping intent is captured before
  # merging. Bypass with the `skip-changeset` label on the PR.
  # ──────────────────────────────────────────────────────────────────────
  changeset-check:
    name: Changeset
    if: |
      github.event_name == 'pull_request' &&
      !contains(github.event.pull_request.labels.*.name, 'skip-changeset')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          # changeset status needs main as a comparison base.
          fetch-depth: 0
      - uses: ./.github/actions/setup

      - name: Verify changeset present
        run: vp run changeset status --since=origin/${{ github.base_ref }}

  # ──────────────────────────────────────────────────────────────────────
  # Aggregate gate — single status for branch protection to require.
  # ──────────────────────────────────────────────────────────────────────
  ci-success:
    name: CI Success
    if: always()
    needs: [pr-title, lint, typecheck, test, build, e2e, changeset-check]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Verify all required jobs succeeded
        env:
          RESULTS: ${{ toJson(needs) }}
        run: |
          echo "$RESULTS"
          echo "$RESULTS" | python3 -c "
          import json, sys
          results = json.load(sys.stdin)
          failed = [name for name, info in results.items()
                    if info.get('result') not in ('success', 'skipped')]
          if failed:
              print(f'Failed/cancelled jobs: {failed}', file=sys.stderr)
              sys.exit(1)
          print('All required jobs passed.')
          "

  # ──────────────────────────────────────────────────────────────────────
  # Release — runs only on push to main, after the full CI gate passes.
  #
  #   • If pending .changeset/*.md files exist, opens (or updates) a
  #     "Version Packages" PR that bumps versions, regenerates
  #     CHANGELOG.md entries, and removes the consumed changesets.
  #
  #   • If the previous push merged a "Version Packages" PR (no pending
  #     changesets remain, but versions were just bumped), publishes
  #     every changed package to npm with provenance, pushes git tags,
  #     and creates a GitHub Release per tag.
  #
  # Reuses the `build-output` artifact produced by the `build` job — no
  # second build, no drift between what CI tested and what gets shipped.
  # Job-level concurrency serializes release runs across pushes to main
  # (workflow-level concurrency still governs the rest of CI).
  # ──────────────────────────────────────────────────────────────────────
  release:
    name: Release
    # `always()` + explicit result check is required here: ci-success
    # uses `if: always()`, and its transitive ancestors (`pr-title`,
    # `changeset-check`) are skipped on push events. Without `always()`
    # here, GitHub's default `success()` propagation sees the skipped
    # ancestors and skips `release` even though ci-success's own
    # conclusion is `success`. The `needs.ci-success.result` check
    # restores the real gate — release runs only when CI actually passed.
    if: |
      always() &&
      needs.ci-success.result == 'success' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    needs: [ci-success]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: release
      cancel-in-progress: false
    permissions:
      # Open/update the Version Packages PR, push tags, create releases.
      contents: write
      pull-requests: write
      # npm provenance attestation (sigstore via OIDC).
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          # Changesets needs full history to compute version bumps and
          # generate accurate changelog entries.
          fetch-depth: 0
          # Use a token that lets the bot's PR trigger downstream workflows
          # if/when one is added; falls back to GITHUB_TOKEN.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup

      - name: Download build artifacts
        # Reuse dist/ from the `build` job — same commit, same bits that
        # passed the full CI gate above.
        uses: actions/download-artifact@v5
        with:
          name: build-output
          path: packages

      - name: Create Release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: vp run version
          publish: vp run release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Auth to npm is via OIDC (npm Trusted Publishers) — the
          # `id-token: write` permission above lets pnpm exchange a
          # GitHub OIDC token for a short-lived npm publish credential
          # at publish time. No long-lived NPM_TOKEN is needed.
          #
          # Provenance attaches a sigstore attestation to each tarball
          # describing the build. Requires id-token: write + a public
          # GitHub-hosted runner (both satisfied above).
          NPM_CONFIG_PROVENANCE: "true"
          # `pnpm publish` defaults to refusing publish on a non-default
          # branch / dirty tree. The Version Packages merge has just
          # occurred on main; disable the extra guard so the publish step
          # can proceed.
          NPM_CONFIG_GIT_CHECKS: "false"
