name: Scorecard

# OpenSSF Scorecard runs a battery of automated checks measuring the
# project's supply-chain hygiene (branch protection, signed releases,
# pinned dependencies, etc.) and uploads results to the Security tab.
# A README badge surfaces the score publicly.

on:
  branch_protection_rule:
  push:
    branches: [main]
  schedule:
    # Weekly, Mondays 05:23 UTC.
    - cron: "23 5 * * 1"

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # Required to upload SARIF results to the Security tab.
      security-events: write
      # Required to receive a badge from the OpenSSF API.
      id-token: write
      contents: read
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish the score so the README badge can pick it up. Public
          # repos only.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
