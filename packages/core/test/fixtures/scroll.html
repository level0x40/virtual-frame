<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
      }
      .scroll-container {
        width: 300px;
        height: 200px;
        overflow: auto;
        border: 1px solid #ccc;
      }
      .tall-content {
        height: 1000px;
        background: linear-gradient(to bottom, #f00, #00f);
      }
      .wide-content {
        width: 1500px;
        height: 50px;
        background: linear-gradient(to right, #0f0, #f0f);
      }
    </style>
  </head>
  <body>
    <div class="scroll-container" id="scroll-box">
      <div class="tall-content" id="tall">Tall scrollable content</div>
      <div class="wide-content" id="wide">Wide scrollable content</div>
    </div>
    <p id="status">ready</p>
  </body>
</html>
